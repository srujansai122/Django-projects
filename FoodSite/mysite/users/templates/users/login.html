{% extends "food/base.html" %}

{% block body %}
<div class="flex items-center justify-center min-h-screen bg-gray-100">
  <form method="post" class="w-full max-w-md bg-white shadow-md rounded px-8 pt-6 pb-8">
      {% csrf_token %}   
      
      {% if form.non_field_errors %}
      <div class="mb-4 bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded relative" role="alert">
        {% for error in form.non_field_errors %}
          <p class="text-sm font-semibold">{{ error }}</p>
        {% endfor %}
      </div>
      {% endif %}
      
      <h2 class="text-2xl font-bold text-center text-gray-800 mb-6">Login</h2>
      
      <div class="mb-4">
          <label for="username" class="block text-gray-700 text-sm font-bold mb-2">
              Login Name
          </label>
          <div class="p-2 bg-gray-50 rounded border border-gray-300">
              {{ form.username }}
          </div>
      </div>
      
      <div class="mb-6">
          <label for="password" class="block text-gray-700 text-sm font-bold mb-2">
              Password
          </label>
          <div class="p-2 bg-gray-50 rounded border border-gray-300">
              {{ form.password }}
          </div>
      </div>
      
      <button type="submit" class="w-full bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:ring-2 focus:ring-blue-400">
          Submit
      </button>
      
      <p class="mt-4 text-center text-sm text-gray-600">
          Don't have an account? 
          <a href="{% url 'users:register' %}" class="text-blue-500 hover:text-blue-700 font-semibold">
              Register here
          </a>
      </p>
  </form>
</div>
{% endblock %}
