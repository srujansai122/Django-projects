{% extends "food/base.html" %}

{% block body %}
<div class="flex items-center justify-center min-h-screen bg-gray-100">
    <div class=" shadow-lg rounded-lg p-8 w-full max-w-md text-center">

        <img src="{{ user.profile.image.url }}" 
             alt="Profile Image" 
             class="w-32 h-32 rounded-full mx-auto mb-4 border-4 border-blue-500 shadow-md">

        <!-- User Info -->
        <h2 class="text-2xl font-bold text-gray-800 mb-2">
            {{ user.first_name }} {{ user.last_name }}
        </h2>
        <p class="text-gray-600 mb-1">@{{ user.username }}</p>
        <p class="text-gray-600 mb-6">{{ user.email }}</p>

        <div class="space-x-4">
            <a href="{% url 'users:logout' %}" 
               class="px-4 py-2 bg-red-500 text-white rounded-lg hover:bg-red-600 transition">
                Logout
            </a>
        </div>
    </div>
</div>
{% endblock %}
