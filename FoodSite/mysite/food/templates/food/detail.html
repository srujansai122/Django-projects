{% extends "food/base.html" %}

{% block body %}
<div class="max-w-3xl mx-auto px-6 py-10">
  <div class="bg-white rounded-lg shadow-lg overflow-hidden">
    <img src="{{item.item_image}}" alt="{{item.item_name}}" class="w-full h-64 object-cover">

    <div class="p-6">
      <h1 class="text-3xl font-bold text-green-700 mb-4">{{ item.item_name }}</h1>
      <p class="text-gray-700 text-lg mb-4">{{ item.item_desc }}</p>
      <p class="text-xl font-semibold text-gray-900 mb-6">₹{{ item.item_price }}</p>
      <div class="flex space-x-4">
        {% if user == item.user_name %}
          <a href="{% url 'food:editItem' item.id %}" 
          class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition">
          Edit
        </a>
        <a href="{% url 'food:deleteItem' item.id %}" 
        class="px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 transition">
        Delete
        </a>
        {% endif %}
        <a href="{% url 'food:index'%}" 
           class="px-4 py-2 bg-gray-600 text-white rounded-lg hover:bg-gray-700 transition">
          Back
        </a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
