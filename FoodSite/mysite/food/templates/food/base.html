<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FoodSite</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 text-gray-800">
  <nav class="bg-white shadow-md">
    <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
      <div class="text-2xl font-bold text-green-600">
        FoodSite
      </div>
      <div class="space-x-6">
        {% if  user.is_authenticated %}
        <a href="{% url 'food:index' %}" class="text-gray-700 hover:text-green-600">Home</a>
        <a href="{% url 'food:Itemform' %}" class="text-gray-700 hover:text-green-600">Create Item</a>
        {% endif %}
        {% if user.is_authenticated %}
        <a href="{% url 'users:logout' %}" class="text-gray-700 hover:text-green-600">Logout</a>
        {% else  %}
        <a href="{% url 'users:login' %}" class="text-gray-700 hover:text-green-600">Login</a>
        <a href="{% url 'users:register' %}" class="text-gray-700 hover:text-green-600">SignUp</a>
        {% endif %}
        <a href="{% url 'users:profile' %}" class="text-gray-700 hover:text-green-600">{{user.username}}</a>
      </div>
    </div>
  </nav>
{% if messages %}
  {% for message in messages %}
    <div class="px-4 py-2 mb-2 rounded-lg shadow 
                {% if message.tags == 'success' %} bg-green-100 text-green-700 border border-green-400 
                {% elif message.tags == 'error' %} bg-red-100 text-red-700 border border-red-400 
                {% elif message.tags == 'warning' %} bg-yellow-100 text-yellow-700 border border-yellow-400 
                {% else %} bg-blue-100 text-blue-700 border border-blue-400 
                {% endif %}">
      {{ message }}
    </div>
  {% endfor %}
{% endif %}
  {% block body%}
  {%endblock %}



</body>
</html>
