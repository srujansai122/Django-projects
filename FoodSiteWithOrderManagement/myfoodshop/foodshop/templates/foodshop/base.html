<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}FoodShop{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-900 min-h-screen flex flex-col">
    <nav class="bg-white shadow-md">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <a href="{% url 'index' %}" class="text-2xl font-bold text-green-600">FoodShop</a>
            <div class="space-x-6">
                <a href="{% url 'index' %}" class="text-gray-700 hover:text-green-600">Home</a>
                <a href="#" class="text-gray-700 hover:text-green-600">About</a>
                <a href="#" class="text-gray-700 hover:text-green-600">Contact</a>
            </div>
        </div>
    </nav>

    <main class="flex-1 max-w-7xl mx-auto px-4 py-8">
        {% block body %}
        {% endblock %}
    </main>

    <footer class="bg-white shadow-inner">
        <div class="max-w-7xl mx-auto px-4 py-4 text-center text-gray-600">
            &copy; 2026 FoodShop. All rights reserved.
        </div>
    </footer>
</body>
</html>
