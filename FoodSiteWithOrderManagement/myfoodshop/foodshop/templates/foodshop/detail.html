{% extends "foodshop/base.html" %}

{% block title %}{{ product.name }} - FoodShop{% endblock %}

{% block body %}
<div class="max-w-4xl mx-auto bg-white shadow-md rounded-lg overflow-hidden">
    <img src="{{ product.image.url }}" alt="{{ product.name }}" class="w-full h-64 object-cover">
    <div class="p-6">
        <h1 class="text-3xl font-bold mb-4">{{ product.name }}</h1>
        <p class="text-green-600 text-2xl font-semibold mb-4">₹{{ product.price }}</p>
        <p class="text-gray-700 mb-4">{{ product.description }}</p>
        <p class="text-sm text-gray-500 mb-4">Stock: {{ product.stock }}</p>

        <label for="quantity" class="block text-sm font-medium text-gray-700 mb-2">Select Quantity</label>
        <select id="quantity" name="quantity" class="w-32 border-gray-300 rounded-md shadow-sm focus:ring-green-500 focus:border-green-500 mb-4">
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
        </select>

        {% if product.active %}
            <span class="inline-block px-3 py-1 text-sm font-semibold text-green-800 bg-green-100 rounded">Active</span>
        {% else %}
            <span class="inline-block px-3 py-1 text-sm font-semibold text-red-800 bg-red-100 rounded">Inactive</span>
        {% endif %}

        <div class="mt-6">
            <button class="px-6 py-2 bg-green-600 text-white font-semibold rounded hover:bg-green-700 transition">
                Add to Cart
            </button>
            <button class="px-6 py-2 bg-gray-500 text-white font-semibold rounded transition">
                Buy Now
            </button>
        </div>
    </div>
</div>
{% endblock body %}
